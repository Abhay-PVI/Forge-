<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>List of Tables</title>
  <style>
    @media print {
      @page {
        size: A4; margin: 10mm;
      }
      body {
        margin: 0;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
    }

    .report-page.lot-page {
      padding: 3.5rem;
      height: 100vh;
      box-sizing: border-box;
      page-break-after: always;
      font-family: system-ui, -apple-system, sans-serif;
      color: #1e293b;
      background-color: #ffffff;
    }

    .lot-page .toc-row.toc-level-1 {
      font-weight: normal !important;
      font-size: 12.5px !important;
      padding-top: 0.1rem !important;
    }

    .heading {
      font-size: 2rem;
      font-weight: 700;
      color: #0f172a;
      margin: 0;
    }

    .divider {
      border: none;
      height: 1px;
      background-color: #cbd5e1;
      margin: 1rem 0 2rem 0;
    }

    .list-container {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .lot-row {
      display: flex;
      align-items: flex-end;
      width: 100%;
      color: #334155;
      font-size: 0.95rem;
    }

    .title {
      background-color: #fff;
      padding-right: 0.5rem;
      z-index: 1;
    }

    .label {
      color: #0f172a;
      font-weight: 600;
    }

    .dot-leader {
      flex-grow: 1;
      border-bottom: 1px dotted #94a3b8;
      margin-bottom: 0.25rem;
    }

    .page-number {
      background-color: #fff;
      padding-left: 0.5rem;
      z-index: 1;
      text-align: right;
      min-width: 1.5rem;
    }
    /* Support classes for dynamically rendered simple lists */
    .toc-row {
      display: flex;
      align-items: flex-end;
      width: 100%;
      color: #334155;
      font-size: 0.95rem;
      margin-bottom: 0.4rem;
    }
    .toc-title {
      background-color: #fff;
      padding-right: 0.5rem;
      z-index: 1;
    }
  </style>
</head>
<body>

  <div class="report-page lot-page" style="height: auto; min-height: 100vh;">
    <div id="lot-content" style="margin-bottom: 3rem;">
      {{LIST_OF_TABLES_PLACEHOLDER}}
    </div>

    <div id="lof-content">
      {{LIST_OF_FIGURES_PLACEHOLDER}}
    </div>
  </div>

</body>
</html>
