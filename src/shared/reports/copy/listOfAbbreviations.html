<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>List of Abbreviations</title>
  <style>
    @media print {
      @page {
        size: A4;
        margin: 10mm;
      }

      body {
        margin: 0;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
    }

    .report-page.loa-page {
      padding: 3.5rem;
      min-height: 100vh;
      box-sizing: border-box;
      page-break-after: always;
      font-family: system-ui, -apple-system, sans-serif;
      color: #1e293b;
      background-color: #ffffff;
    }

    .heading {
      font-size: 2rem;
      font-weight: 700;
      color: #0f172a;
      margin: 0;
    }

    .divider {
      border: none;
      height: 1px;
      background-color: #cbd5e1;
      margin: 1rem 0 2rem 0;
    }

    .loa-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    .loa-table th {
      background-color: #002060;
      color: white;
      text-align: left;
      font-weight: 600;
      padding: 8px 12px;
      font-size: 0.95rem;
      border: 1px solid #cbd5e1;
    }

    .loa-table td {
      padding: 8px 12px;
      font-size: 0.9rem;
      color: #334155;
      border: 1px solid #ffffff;
    }

    .loa-table tr:nth-child(even) {
      background-color: #f8fafc;
    }

    .loa-table thead {
      display: table-header-group;
    }

    .abbreviations-table {
      width: 100%;
      border-collapse: collapse;
    }

    .abbreviations-table th,
    .abbreviations-table td {
      padding: 8px 12px;
      border-bottom: 1px dotted #ffffff;
      text-align: left;
    }

    .abbreviations-table th {
      color: #ffffff;
      font-weight: bold;
      border-bottom: 2px solid #1a3e6f;
    }
  </style>
</head>

<body>

  <div class="report-page loa-page">
    <div id="loa-content">
      {{LIST_OF_ABBREVIATIONS_PLACEHOLDER}}
    </div>
  </div>

</body>

</html>
