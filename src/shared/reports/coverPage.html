<style>
  .cover-page {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100vh;
    box-sizing: border-box;
    page-break-after: always;
  }

  .cover_im {
    margin-top: 0ch;
    max-height: 150%;
    max-width: 5000px;
  }

  .cover-image {
    flex: 1;
    background-size: cover;
    background-position: center;
    overflow: hidden;
  }

  .cover-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .cover-blue {
    background: #002060;
    color: white;
    padding: 60px 75px;
  }

  .cover-project {
    font-size: 16px;
    font-weight: 400;
    margin-bottom: 16px;
    line-height: 1.6;
  }

  .cover-report {
    font-size: 16px;
    font-weight: 400;
    line-height: 1.4;
  }

  .cover-green {
    background: #005f5f;
    color: white;
    padding: 40px 75px;
  }

  .cover-footer-item {
    font-size: 16px;
    line-height: 1.6;
  }
</style>

<div class="cover-page">

  <div class="cover-image">
    <img src="{{COVER_IMAGE}}" alt="pv_backgroung">
  </div>

  <div class="cover-blue">
    <div class="cover-project">
      {{PROJECT_NAME}}
    </div>

    <div class="cover-report">
      {{REPORT_TITLE}}
    </div>
  </div>

  <div class="cover-green">
    <div class="cover-footer-item">
      Submitted to {{CLIENT_NAME}}
    </div>

    <div class="cover-footer-item">
      Prepared by {{PREPARED_BY}}
    </div>
  </div>

</div>

<div class="page-break"></div>
