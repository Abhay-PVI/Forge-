<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>List of Abbreviations</title>
  <style>
    @media print {
      @page {
        size: A4;
        margin: 10mm;
      }

      body {
        margin: 0;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
    }

    .report-page.loa-page {
      padding: 3.5rem;
      min-height: 100vh;
      box-sizing: border-box;
      page-break-after: always;
      font-family: "Segoe UI", SegoeUI, Arial, sans-serif;
      font-size: 12px;
      color: #1e293b;
      background-color: #ffffff;
    }

    .heading {
      font-size: 2rem;
      font-weight: 700;
      color: #0f172a;
      margin: 0;
    }

    .divider {
      border: none;
      height: 1px;
      background-color: #cbd5e1;
      margin: 1rem 0 2rem 0;
    }

    .loa-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    .loa-table th {
      background-color: #002060;
      color: white;
      text-align: left;
      font-weight: 600;
      padding: 8px 12px;
      font-size: 0.95rem;
      border: 1px solid #cbd5e1;
    }

    .loa-table td {
      padding: 8px 12px;
      font-size: 0.9rem;
      color: #334155;
      border: 1px solid #cbd5e1;
    }

    .loa-table tr:nth-child(even) {
      background-color: #f8fafc;
    }

    .loa-table thead {
      display: table-header-group;
    }

    .abbreviations-table {
      width: 100%;
      border-collapse: collapse;
    }

    .abbreviations-table th,
    .abbreviations-table td {
      padding: 8px 12px;
      border-bottom: 1px dotted #cbd5e1;
      text-align: left;
    }

    .abbreviations-table th {
      color: #1a3e6f;
      font-weight: bold;
      border-bottom: 2px solid #1a3e6f;
    }

    .abbreviation-row:hover {
      background-color: #f8fafc;
    }

    .loa-del-btn {
      background: none;
      border: none;
      color: #ef4444;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      line-height: 1;
      opacity: 0.7;
      transition: opacity 0.15s, background-color 0.15s;
    }

    .loa-del-btn:hover {
      opacity: 1;
      background-color: #fee2e2;
    }

    .loa-edit-controls {
      margin-top: 16px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .loa-add-btn, .loa-clean-btn {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.15s, border-color 0.15s;
    }

    .loa-add-btn {
      background: #f1f5f9;
      color: #0f172a;
      border: 1px solid #cbd5e1;
    }

    .loa-add-btn:hover {
      background: #e2e8f0;
      border-color: #94a3b8;
    }

    .loa-clean-btn {
      background: #e0f2fe;
      color: #0369a1;
      border: 1px solid #bae6fd;
    }

    .loa-clean-btn:hover {
      background: #bae6fd;
      border-color: #7dd3fc;
    }
  </style>
</head>

<body>

  <div class="report-page loa-page">
    <div id="loa-content">
      {{LIST_OF_ABBREVIATIONS_PLACEHOLDER}}
    </div>
  </div>

</body>

</html>
