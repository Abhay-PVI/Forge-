<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Table of Contents</title>
  <style>
    @media print {
      @page {
        size: A4;
        margin: 12mm;
      }

      body {
        margin: 0;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
    }

    .report-page.toc-page {
      padding: 3.5rem;
      height: 100vh;
      box-sizing: border-box;
      page-break-after: always;
      font-family: "Segoe UI", SegoeUI, Arial, sans-serif;
      font-size: 14px;
      color: #1e293b;
      background-color: #ffffff;
    }

    .heading {
      font-size: 2rem;
      font-weight: 700;
      color: #0f172a;
      margin: 0;
    }

    .divider {
      border: none;
      height: 0px;
      background-color: #cbd5e1;
      margin: 1rem 0 2rem 0;
    }

    .list-container {
      display: block;
    }

    .list-container > .toc-row,
    .list-container > h1.toc-heading,
    .list-container > h2.toc-heading,
    .list-container > h3.toc-heading,
    .list-container > h4.toc-heading,
    .list-container > h5.toc-heading,
    .list-container > h6.toc-heading {
      display: flex;
      align-items: baseline;
      margin: 0;
      padding: 0.14rem 0;
      font-family: "Segoe UI", SegoeUI, Arial, sans-serif;
      font-size: 12px;
      line-height: 1.35;
    }

    .toc-row.toc-level-1 {
      font-weight: bold;
      font-size: 13.5px;
      padding-top: 0.24rem;
    }

    .toc-row.toc-level-2 {
      margin-left: 20px;
      font-weight: normal;
      font-size: 12.5px;
      padding-top: 0.1rem;
    }

    .toc-row.toc-level-3 {
      margin-left: 40px;
      font-weight: normal;
      font-size: 12px;
      padding-top: 0.1rem;
    }

    .toc-heading[data-toc-level="1"] {
      font-weight: bold;
      padding-top: 0.24rem;
    }

    .toc-heading[data-toc-level="2"] {
      margin-left: 20px;
      font-weight: normal;
      padding-top: 0.1rem;
    }

    .toc-heading[data-toc-level="3"] {
      margin-left: 40px;
      font-weight: normal;
      padding-top: 0.1rem;
    }

    .toc-title {
      white-space: nowrap;
    }

    .toc-dots {
      flex: 1;
      border-bottom: 1px dotted #000;
      margin: 0 ;
      transform: translateY(-3px);
    }

    .toc-page-num {
      white-space: nowrap;
      min-width: 20px;
      text-align: right;
    }

    .title {
      background-color: #fff;
      padding-right: 0.1rem;
      z-index: 1;
    }

    .dot-leader {
      flex-grow: 1;
      border-bottom: 1px dotted #94a3b8;
      margin-bottom: 0;
    }

    .page-number {
      background-color: #fff;
      padding-left: 0.5rem;
      z-index: 1;
      text-align: right;
      min-width: 1.5rem;
    }
  </style>
</head>

<body>

  <div class="report-page toc-page">
    <h2 class="heading">Table of Contents</h2>
    <hr class="divider" />

    <div class="list-container" id="toc-content">
      {{TOC_PLACEHOLDER}}
    </div>
  </div>

</body>

</html>
